  translated: κάθε παιδί τρώει ένα μήλο
d50b7182876f888154365419a332052297adbc8c21c378311e11bca6:
  original: explanation
  translated: εξήγηση
cf64118f308304d574957ca07f38d45b3fef883a577ce80d50196d76:
  original: |-
    "puereris" is the collective form of the noun,
          and the verb is in the collective form.
  translated: |-
    το «puereris» είναι το ουστιαστικό στον συλλογικό αριθμό,
          επομένως και το ρήμα είναι στον ίδιο αριθμό.
90ea392eca3d835c9222a4619826b532e33fd69409efde0a69ca1f5e:
  original: The emphasis is on the children as a group.
  translated: Η έμφαση είναι στα παιδιά ως μια ομάδα.
e9d43630701fc77b49276a9ab00961d783b84cd92335300e76603244:
  original: each child is eating an apple
  translated: κάθε παιδί τρώει ένα μήλο
d48a43fa8c14a2d173a71726fa261a53bde68f5051a70dd11f8ecf4d:
  original: |-
    "kiska" is used with the singular form of the noun,
          and the verb is in the singular form.
  translated: |-
    το «kiska» χρησιμοποιείται με το ουσιαστικό στον ενικό,
          οπότε και το ρήμα είναι σε ενικό.
77caf4bb3b096748abdeb7fe39b0235714f8d9e656bcb5b7289265a9:
  original: The emphasis is on the individual child.
  translated: Η έμφαση δίνεται στο μεμονωμένο παιδί.
b8f34dfde55d5256f78b201e1d68fb82be9e3014e43761ee72808e04:
  original: each and every child is eating an apple
  translated: κάθε παιδί τρώει ένα μήλο
9c473aa2280f3d7ad9b573b42acf94cbc7e79b6dbcd3c85a6dadc342:
  original: |-
    "kiska" is used with the collective form of the noun,
          and the verb is in the collective form.
  translated: |-
    το «kiska» χρησιμοποιείται με το ουσιαστικό στον συλλογικό,
          οπότε και το ρήμα είναι σε συλλογικό.
1cc574161470a9c1cf899224e6689b0a6406456cdbd1f95f241358f0:
  original: The emphasis is both on the individual child, and the children as a group.
  translated: Η έμφαση δίνεται τόσο στο μεμονωμένο παιδί όσο και στα παιδιά ως ομάδα.
