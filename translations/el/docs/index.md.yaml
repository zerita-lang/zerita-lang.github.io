ddf2f14b2f486ff50f57529b978a6a4f286d57640f5471303c7724f2:
  original: Zerita
  translated: Ζερίτα
  comments: []
  literals: []
9771c59cccbc26f4ef4ac11838269e756ee607bd8676b431ed9989f5:
  original: Zerita is a feature-rich, expressive conlang, without any exceptions.
  translated: |-
    Η ζερίτα είναι μια κατασκευασμένη γλώσσα με πολύ πλούσια χαρακτηριστικά,
    εκφραστική, χωρίς εξαιρέσεις.
  comments: []
  literals: []
a85d7fe4eb3bdf44583e529364e2e4c8b467d9ab26c3bba7ce20df27:
  original: |-
    It is a VSO language, inspired by other latin-based languages for the
    vocabulary, the writing system, and the pronunciation. As such, it uses
    the latin alphabet to be written, it has 1-1 correspondence between the
    written and the spoken form, and is meant to be easy for machines to
    understand. Expressiveness comes with a steeper learning curve, but the
    absence of exceptions make up for it.
  translated: |-
    Το συντακτικό της ακολουθεί την σειρά Ρήμα - Υποκείμενο - Αντικείμενο,
    και είναι εμπνευσμένη από άλλες λατινογενείς γλώσσες όσον αφορά
    το λεξιλόγιο λεξιλόγιο, το σύστημα γραφής και την προφορά.
    Ως εκ τούτου, χρησιμοποιεί το λατινικό αλφάβητο για να γραφτεί, έχει μια
    1-1 αντιστοιχία μεταξύ του γραπτού και του προφορικού τύπου, και είναι
    σχεδιασμένη για να είναι εύκολη να την καταλάβουν οι υπολογιστές. Οι
    μεγάλες εκφραστικές δυνατότητες δημιουργούν αυξημένες δυσκολίες στην
    εκμάθηση, αλλά η απουσία εξαιρέσεων το αναπληρώνει.
  comments: []
  literals: []
36c6c5fe72836f2188c908ebf39ad1afa40d30311c543f2b9524d892:
  original: Brief overview of zerita
  translated: Μια μικρή σύνοψη της ζερίτα
  comments: []
  literals: []
d6cf0afcb4ff4a8f63c0e86dd8a4d3c1aea2a32b2d84f48753def589:
  original: |-
    Zerita is meant to be a highly regular language, avoiding exceptions. It
    also doesn't try to innovate on the phonetics, writing, and vocabulary,
    as these are thought as the less substantial parts of a language.
    Avoiding exceptions also makes it easy for machine parsing and science.
  translated: |-
    Η ζερίτα προορίζεται να είναι μια εξαιρετικά κανονική γλώσσα, αποφεύγοντας
    τις εξαιρέσεις. Επίσης, δεν προσπαθεί να καινοτομήσει στη φωνητική, τη γραφή
    και το λεξιλόγιο, καθώς αυτά θεωρούνται ως τα πιο επουσιώδη μέρη μιας γλώσσας.
    Η αποφυγή εξαιρέσεων διευκολύνει επίσης την ανάλυση της από υπολογιστές και
    τον επιστημονικό λόγο.
  comments: []
  literals: []
c79951bb3cec50d09d1475eb98f5037bee02d4577ee25e64f8606a47:
  original: |-
    Zerita is easy, but extremely expressive. The design choice is always to
    opt for the more expressive choice, even at the cost of making it more
    complex, but not more complicated.
  translated: |-
    Η ζερίτα είναι εύκολη, αλλά εξαιρετικά εκφραστική. Κατά τον σχεδιασμό της πάντα
    γίνεται η πιο εκφραστική επιλογή, ακόμη και αν την κάνει πιο περίπλοκη, αρκεί να
    μην την κάνει πιο μπερδεμένη.
  comments: []
  literals: []
0821f1a9f69a434b3ba1ebfbb1ac3d6e009554d16f41783368516a6d:
  original: |-
    One other choice that is present throughout zeritan rule is the information
    flow. Zerita is a language that is meant to be literal, and express the
    necessary information. For example, in English, a sentence like
    "The door was red", is strongly associated with the past state. The speaker
    most probably means that the door was read in the past, but not any more.
    Contrary, in Zerita, "${Sive ta portis ruje}" means that the door was red,
    but for the present state of the colour door, you cannot infer anything.
  translated: |-
    Μια άλλη επιλογή διαπερνά όλο τον σχεδιασμό της ζερίτα αφορά την ροή των πληροφοριών.
    Η ζερίτα είναι μια γλώσσα που προορίζεται να είναι κυριολεκτική και να εκφράζει μόνο
    τις απαραίτητες πληροφορίες. Για παράδειγμα, στα ελληνικά, μια πρόταση όπως
    «Η πόρτα ήταν κόκκινη», είναι έντονη η έννοια του παρελθόντος. Ο ομιλητής πιθανότατα
    εννοεί ότι η πόρτα ήταν κόκκινη στο παρελθόν, αλλά όχι πια. Αντίθετα, στη ζερίτα,
    η πρόταση «Sive ta portis ruje» σημαίνει ότι η πόρτα ήταν κόκκινη, αλλά για το
    τωρινό χρώμα της πόρτας, δεν μπορείτε να συμπεράνετε τίποτα.
  comments: []
  literals:
    - Sive ta portis ruje
9a7c17e8bd4896dc1b5ca19c0cb833e86d037c3c1804f781b622e91f:
  original: |-
    Even though zerita is using latin-based languages for the vocabulary,
    the writing system, and the pronunciation, this isn't true for the grammar
    and the syntax. Zerita is using all natural languages and conlangs as
    inspiration, and is trying to be innovative on these two.
  translated: |-
    Παρόλο που η ζερίτα βασίζεται στις λατινικές γλώσσες για το λεξιλόγιο, το σύστημα
    γραφής και την προφορά, αυτό δεν ισχύει για τη γραμματική και τη σύνταξη. Η ζερίτα
    χρησιμοποιεί όλες τις φυσικές και κατασκευασμένες γλώσσες για έμπνευση, και προσπαθεί
    να είναι καινοτόμος σε αυτά τα δύο.
  comments: []
  literals: []
