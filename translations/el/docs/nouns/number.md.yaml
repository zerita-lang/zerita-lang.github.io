    "Countable nouns are nouns that can be counted by an integer: apples,
    kilograms, humans."
  translated:
    "Μετρήσιμα ουσιαστικά είναι τα ουσιαστικά που μπορούν να μετρηθούν με
    έναν ακέραιο αριθμό: μήλα, κιλά, άνθρωποι."
