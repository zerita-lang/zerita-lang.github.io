00b5f5d9aa2590b513acbb0ad4814b208be19a45ff77c9b0b4205d69:
  original: |-
    Singular is used for exactly one, fractional for strictly between zero and one, zero for none, and any
    number more than 1 is plural (even when it's not full two items).
  translated: |-
    Ο ενικός αριθμός χρησιμοποιείται για ακριβώς ένα αντικείμενο, ο κλασματικός για αυστηρά μεταξύ
    μηδενός και ενός αντικειμένου, ο μηδενικός για κανένα και για οποιοδήποτε αριθμός μεγαλύτερο από 1
    χρησιμοποιείται πληθυντικός (ακόμα και όταν δεν είναι πλήρως δύο αντικείμενα).
98f050c090f21dc2751709b59b30de53f128cd8d759af6256a52f299:
  original:
    Negative numbers use the number that would have been used by the number
    with the same absolute value.
  translated:
    Οι αρνητικοί αριθμοί χρησιμοποιούν τον αριθμό που θα είχε χρησιμοποιηθεί
    από τον αριθμό με την ίδια απόλυτη τιμή.
