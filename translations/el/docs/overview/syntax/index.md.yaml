  translated: δευτερεύουσα πρόταση-φάντασμα
00fe309c46aedfc2fe0feaffbd0d076e04c7b5bd9249b27f81d772fe:
  original: if you don't study hard
  translated: αν δεν διαβάζεις πολύ
b30e3596b3a684252ad57e808a4ccb0e4df1c4035a4b5f0ae8ad8dd3:
  original: you'll fail
  translated: θα αποτύχεις
d8e58f15b3a1ad6629907b82e3d7f6828a5a65373a704fe783b8400a:
  original: |-
    The final multi-word syntactic structure that we focus on, is the phrase, which is just
    a sequence of connected words, for example "the big bad wolf".
  translated: |-
    Η τελευταία συντακτική δομή με παραπάνω από μια λέξη που θα συγκεντρωθούμε είναι η φράση,
    όπου είναι μια ακολουθία συνδεδεμένων λέξεων, για παράδειγμα «ο μεγάλος κακός λύκος».
